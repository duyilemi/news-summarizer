<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Summarizer</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { color: #2c3e50; }
        button { background: #3498db; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; }
        button:hover { background: #2980b9; }
        .article { border-bottom: 1px solid #ddd; margin-bottom: 1rem; padding-bottom: 1rem; }
        .title { font-size: 1.2rem; font-weight: bold; }
        .summary { margin: 0.5rem 0; }
        .meta { font-size: 0.8rem; color: #7f8c8d; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>📰 AI News Summarizer</h1>
    <button id="refreshBtn">Refresh Summaries</button>
    <div id="content">Click the button to load latest summaries.</div>

    <script src="script.js"></script>
</body>
</html>
